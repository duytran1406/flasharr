services:
  flasharr:
    image: ghcr.io/duytran1406/flasharr:latest  # Use pre-built image
    container_name: flasharr
    restart: unless-stopped
    
    ports:
      - "8484:8484"
    
    volumes:
      # Persistent data
      - ./appData:/appData
      
      # Shared download staging folder visible to Flasharr and Sonarr/Radarr
      # - /path/to/flasharr-download:/downloads
      # - /path/to/flasharr-download:/data/flasharr-download
    
    environment:
      # Timezone
      - TZ=Asia/Bangkok
      
      # Logging level (optional)
      - RUST_LOG=flasharr=info,tower_http=info
      
      # AppData directory (don't change unless you know what you're doing)
      - FLASHARR_APPDATA_DIR=/appData
      - FLASHARR_SYMLINK_REAL_BASE=/data/flasharr-download
      - PUID=911
      - PGID=911
      - UMASK=002
      - FLASHARR_RUN_AS_ROOT=false
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
