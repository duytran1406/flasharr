services:
  flasharr:
    build:
      context: .
      dockerfile: Dockerfile
    image: flasharr:latest
    container_name: flasharr
    restart: unless-stopped
    
    ports:
      - "8484:8484"
    
    volumes:
      # AppData volume for persistence
      - ./appData:/appData

      # Shared download staging folder visible to Flasharr and Sonarr/Radarr
      # - /path/to/flasharr-download:/downloads
      # - /path/to/flasharr-download:/data/flasharr-download

    environment:
      # AppData directory
      - FLASHARR_APPDATA_DIR=/appData
      - FLASHARR_SYMLINK_REAL_BASE=/data/flasharr-download
      - PUID=911
      - PGID=911
      - UMASK=002
      - FLASHARR_RUN_AS_ROOT=false
      
      # Logging level
      - RUST_LOG=flasharr=info,tower_http=info
    
    # Optional: Resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 128M
    
    # Optional: Health check override
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # Optional: Network configuration
    # networks:
    #   - flasharr-network

# Optional: Custom network
# networks:
#   flasharr-network:
#     driver: bridge

# Optional: Named volumes
# volumes:
#   flasharr-data:
#     driver: local
