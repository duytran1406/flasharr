services:
  flasharr:
    image: ghcr.io/duytran1406/flasharr:latest
    container_name: flasharr
    restart: unless-stopped
    ports:
      - "8484:8484"
    volumes:
      - ./appData:/appData
      # Shared download staging folder visible to Flasharr and Sonarr/Radarr
      # - /path/to/flasharr-download:/downloads
      # - /path/to/flasharr-download:/data/flasharr-download
    environment:
      - TZ=Asia/Bangkok
      - RUST_LOG=flasharr=info,tower_http=info
      - FLASHARR_APPDATA_DIR=/appData
      - FLASHARR_SYMLINK_REAL_BASE=/data/flasharr-download
      - PUID=911
      - PGID=911
      - UMASK=002
      - FLASHARR_RUN_AS_ROOT=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-update service (optional)
  watchtower:
    image: containrrr/watchtower:latest
    container_name: flasharr-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *  # Check daily at 4 AM
    command: --interval 86400  # Check every 24 hours
